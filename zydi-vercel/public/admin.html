<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zydi Admin">
<meta name="theme-color" content="#0A0A12">
<title>Zydi Flow — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0A0A12;--s1:#111119;--s2:#18181F;--s3:#202028;--s4:#28282F;
  --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.14);
  --acc:#00D4FF;--acc2:#0088CC;--acc-dim:rgba(0,212,255,0.1);
  --hot:#FF3B5C;--hot-dim:rgba(255,59,92,0.12);
  --warm:#FF9500;--warm-dim:rgba(255,149,0,0.12);
  --green:#34C759;--green-dim:rgba(52,199,89,0.12);
  --cold:#636366;--cold-dim:rgba(99,99,102,0.15);
  --t:#FFF;--t2:rgba(255,255,255,0.65);--t3:rgba(255,255,255,0.3);
  --font:'Inter',sans-serif;--display:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);-webkit-font-smoothing:antialiased;}
body{font-family:var(--font);color:var(--t);min-height:100%;padding-bottom:calc(40px + var(--sb));}

.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:calc(16px + var(--st)) 20px 16px;background:rgba(10,10,18,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);}
.topbar h1{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-0.01em;}
.topbar h1 span{color:var(--acc);}
.back{display:flex;align-items:center;gap:6px;color:var(--t2);font-size:14px;font-weight:500;text-decoration:none;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:8px 12px;cursor:pointer;}
.back:hover{border-color:var(--bd2);color:var(--t);}

.wrap{max-width:760px;margin:0 auto;padding:20px;}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px;}
.stat .n{font-family:var(--display);font-weight:800;font-size:26px;}
.stat .l{font-size:12px;color:var(--t3);margin-top:2px;}

.tabs{display:flex;background:var(--s1);border-radius:12px;padding:4px;margin-bottom:18px;border:1px solid var(--bd);}
.tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;}
.tab.on{background:var(--s3);color:var(--t);}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:10px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.name{font-weight:600;font-size:15px;}
.email{font-size:13px;color:var(--t2);margin-top:2px;word-break:break-all;}
.meta{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.pill{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.02em;}
.pill.pending{background:var(--warm-dim);color:var(--warm);}
.pill.approved{background:var(--green-dim);color:var(--green);}
.pill.rejected{background:var(--hot-dim);color:var(--hot);}
.pill.admin{background:var(--acc-dim);color:var(--acc);}
.calls-n{font-size:12px;color:var(--t3);font-family:var(--mono);}

.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{flex:1;min-width:90px;padding:10px;border-radius:10px;border:1px solid var(--bd);background:var(--s2);color:var(--t);font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
.btn:active{transform:scale(0.97);}
.btn.approve{background:var(--green-dim);color:var(--green);border-color:transparent;}
.btn.reject{background:var(--hot-dim);color:var(--hot);border-color:transparent;}
.btn.revoke{background:var(--warm-dim);color:var(--warm);border-color:transparent;}
.btn.make-admin{background:var(--acc-dim);color:var(--acc);border-color:transparent;}
.btn:disabled{opacity:0.4;pointer-events:none;}

.empty{text-align:center;padding:60px 20px;color:var(--t3);}
.empty .e-ic{font-size:32px;margin-bottom:10px;}
.loading{text-align:center;padding:60px 20px;color:var(--t2);font-size:14px;}

.toast{position:fixed;bottom:calc(20px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);background:var(--s3);border:1px solid var(--bd2);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .25s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.center-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:30px;}
.center-screen .e-ic{font-size:38px;}
.center-screen p{color:var(--t2);font-size:14px;max-width:280px;}
.center-screen .btn{display:inline-block;padding:12px 22px;background:var(--acc);color:#001018;border:none;border-radius:12px;font-weight:700;cursor:pointer;flex:none;}
</style>
</head>
<body>

<div id="gate" class="center-screen" style="display:none;">
  <div class="e-ic">🔒</div>
  <p id="gate-msg">Checking access…</p>
  <div id="gate-action"></div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <h1>Zydi <span>Admin</span></h1>
    <div class="back" onclick="location.href='/'">← Back to app</div>
  </div>

  <div class="wrap">
    <div class="stats-row">
      <div class="stat"><div class="n" id="st-total">–</div><div class="l">Total users</div></div>
      <div class="stat"><div class="n" id="st-pending">–</div><div class="l">Pending</div></div>
      <div class="stat"><div class="n" id="st-approved">–</div><div class="l">Approved</div></div>
    </div>

    <div class="tabs">
      <div class="tab on" data-f="pending" onclick="setFilter('pending')">Pending</div>
      <div class="tab" data-f="approved" onclick="setFilter('approved')">Approved</div>
      <div class="tab" data-f="all" onclick="setFilter('all')">All</div>
    </div>

    <div id="list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='/api';
let profiles=[];
let filter='pending';

function tok(){
  try{ return (JSON.parse(localStorage.getItem('zydi_sess')||'{}').access_token)||''; }
  catch{ return ''; }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function gate(msg, actionHtml){
  document.getElementById('app').style.display='none';
  document.getElementById('gate').style.display='flex';
  document.getElementById('gate-msg').textContent=msg;
  document.getElementById('gate-action').innerHTML=actionHtml||'';
}

async function load(){
  const t=tok();
  if(!t){
    gate('You need to sign in first.', '<button class="btn" onclick="location.href=\'/\'">Go to sign in</button>');
    return;
  }
  try{
    const r=await fetch(`${API}/admin`,{headers:{'Authorization':`Bearer ${t}`}});
    if(r.status===401){
      gate('Your session expired. Please sign in again.', '<button class="btn" onclick="location.href=\'/\'">Go to sign in</button>');
      return;
    }
    if(r.status===403){
      gate('This account doesn\'t have admin access.', '<button class="btn" onclick="location.href=\'/\'">Back to app</button>');
      return;
    }
    if(!r.ok){
      gate('Couldn\'t load admin data. Please try again.', '<button class="btn" onclick="load()">Retry</button>');
      return;
    }
    const d=await r.json();
    profiles=d.profiles||[];
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    renderStats();
    render();
  }catch(e){
    gate('Network error. Check your connection and try again.', '<button class="btn" onclick="load()">Retry</button>');
  }
}

function renderStats(){
  document.getElementById('st-total').textContent=profiles.length;
  document.getElementById('st-pending').textContent=profiles.filter(p=>p.status==='pending').length;
  document.getElementById('st-approved').textContent=profiles.filter(p=>p.status==='approved').length;
}

function setFilter(f){
  filter=f;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on', el.dataset.f===f));
  render();
}

function render(){
  const list=document.getElementById('list');
  let rows=profiles;
  if(filter==='pending') rows=rows.filter(p=>p.status==='pending');
  else if(filter==='approved') rows=rows.filter(p=>p.status==='approved');

  if(!rows.length){
    list.innerHTML=`<div class="empty"><div class="e-ic">📭</div>No ${filter==='all'?'':filter} users to show.</div>`;
    return;
  }

  list.innerHTML=rows.map(p=>{
    const statusPill=`<span class="pill ${p.status}">${p.status}</span>`;
    const adminPill=p.is_admin?'<span class="pill admin">admin</span>':'';
    const name=p.full_name||p.email?.split('@')[0]||'Unknown';
    const date=p.created_at?new Date(p.created_at).toLocaleDateString():'';
    let actions='';
    if(p.status==='pending'){
      actions=`<div class="actions">
        <div class="btn approve" onclick="act('${p.id}','approve')">Approve</div>
        <div class="btn reject" onclick="act('${p.id}','reject')">Reject</div>
      </div>`;
    }else if(p.status==='approved'){
      actions=`<div class="actions">
        <div class="btn revoke" onclick="act('${p.id}','revoke')">Revoke</div>
        ${!p.is_admin?`<div class="btn make-admin" onclick="act('${p.id}','make_admin')">Make admin</div>`:''}
      </div>`;
    }else if(p.status==='rejected'){
      actions=`<div class="actions">
        <div class="btn approve" onclick="act('${p.id}','approve')">Approve anyway</div>
      </div>`;
    }
    return `<div class="card" id="card-${p.id}">
      <div class="card-top">
        <div>
          <div class="name">${name}</div>
          <div class="email">${p.email||''}</div>
        </div>
        <div class="calls-n">${p.call_count||0} calls</div>
      </div>
      <div class="meta">${statusPill}${adminPill}<span class="calls-n">joined ${date}</span></div>
      ${actions}
    </div>`;
  }).join('');
}

async function act(userId, action){
  const card=document.getElementById('card-'+userId);
  if(card) card.querySelectorAll('.btn').forEach(b=>b.setAttribute('disabled','1'));
  try{
    const r=await fetch(`${API}/admin`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${tok()}`},
      body:JSON.stringify({action, userId})
    });
    if(r.status===401){ gate('Your session expired. Please sign in again.', '<button class="btn" onclick="location.href=\'/\'">Go to sign in</button>'); return; }
    if(!r.ok){ showToast('Action failed — please try again'); if(card) card.querySelectorAll('.btn').forEach(b=>b.removeAttribute('disabled')); return; }

    const labels={approve:'Approved',reject:'Rejected',revoke:'Access revoked',make_admin:'Promoted to admin'};
    showToast(labels[action]||'Done');

    const p=profiles.find(x=>x.id===userId);
    if(p){
      if(action==='approve') p.status='approved';
      else if(action==='reject') p.status='rejected';
      else if(action==='revoke') p.status='pending';
      else if(action==='make_admin') p.is_admin=true;
    }
    renderStats();
    render();
  }catch(e){
    showToast('Network error — please try again');
    if(card) card.querySelectorAll('.btn').forEach(b=>b.removeAttribute('disabled'));
  }
}

load();
</script>
</body>
</html>
